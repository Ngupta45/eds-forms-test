<div
        class="af-custom-submit"
        data-aue-type="component"
        data-aue-model="af-custom-submit"
        data-aue-label="AF Custom Submit"
>
    <!-- Button label is editable in UE -->
    <button
            class="af-custom-submit__button"
            type="button"
            data-aue-prop="label"
    >
        Send
    </button>

    <!-- Endpoint is editable in UE but hidden in UI -->
    <span
            class="af-custom-submit__endpoint"
            data-aue-prop="endpoint"
    >
    http://localhost:3000/contact
  </span>

    <div class="af-custom-submit__status" data-aue-prop="statusMessage"></div>
</div>
